<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mørkyn — Privacy Policy</title>
    <link rel="stylesheet" href="/static/styles.css?v=v0-7-3" />
    <style>
      .privacyPage {
        max-width: 760px;
        margin: 0 auto;
        padding: 36px 20px 64px;
      }
      .privacyPage pre {
        white-space: pre-wrap;
        font-family: inherit;
        line-height: 1.55;
        color: var(--text);
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 18px 20px;
      }
      .privacyTop {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 18px;
      }
    </style>
  </head>
  <body>
    <main class="privacyPage">
      <div class="privacyTop">
        <div>
          <h1>Privacy Policy</h1>
          <p class="empty">Local-first. No tracking. No metrics.</p>
        </div>
        <a class="buttonLike secondaryButton" href="/">Back to Mørkyn</a>
      </div>
      <pre id="privacyBody">Loading…</pre>
    </main>
    <script>
      fetch("/api/privacy")
        .then(function (r) { return r.json(); })
        .then(function (data) {
          document.getElementById("privacyBody").textContent = data.markdown || "Policy unavailable.";
        })
        .catch(function () {
          document.getElementById("privacyBody").textContent =
            "Could not load policy from the app. See PRIVACY_POLICY.md in the project folder.";
        });
    </script>
  </body>
</html>
